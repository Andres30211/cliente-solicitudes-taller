@if (this.mostrarNav) {
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" [routerLink]="['listado-solicitud']">Listado de solicitudes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" [routerLink]="['formulario-solicitud']">Formulario de solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" [routerLink]="['listado-usuarios']">Lista de usuarios</a>
                    </li>
                </ul>
                @if (this.mostrarBuscador) {
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    </form>
                }
                <button (click)="cerrarSesion()">
                    <i class="ti ti-logout" aria-hidden="true">Cerrar sesión</i>
                </button>
            </div>
        </div>
    </nav>
}
